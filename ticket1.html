<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワークショップ抽選システム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fdf6ec;
            color: #4a3728;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            border: 3px solid #f59e0b;
            border-radius: 20px;
            padding: 30px 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.15);
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.8rem;
            color: #d97706;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .desc {
            font-size: 0.95rem;
            color: #78350f;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #f59e0b;
            border-radius: 10px;
            background-color: #fffbeb;
            color: #78350f;
            font-weight: bold;
            margin-bottom: 20px;
            outline: none;
        }
        .btn-draw {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #d97706;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(217, 119, 6, 0.2);
            transition: background 0.2s;
        }
        .btn-draw:hover {
            background-color: #b45309;
        }
        .loading-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(245, 158, 11, 0.2);
            border-top: 5px solid #d97706;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .result-box {
            display: none;
            border-radius: 15px;
            padding: 20px;
            margin-top: 15px;
            text-align: center;
        }
        .win-box {
            background-color: #ecfdf5;
            border: 3px solid #10b981;
            color: #065f46;
        }
        .lose-box {
            background-color: #fff5f5;
            border: 3px solid #f87171;
            color: #991b1b;
        }
        .result-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .result-time {
            font-size: 1.8rem;
            font-weight: bold;
            color: #10b981;
            margin: 15px 0;
            display: block;
        }
        .ticket-id {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>デジタル抽選</h1>
        
        <div id="setup-view">
            <p class="desc">ご希望の時間帯を選択して、<br>「抽選を引く」ボタンを押してください。<br>※お一人様一回限りです。</p>
            <select id="time-select">
                <option value="0">11:00～12:00（受付: 09:45〜10:45）</option>
                <option value="1">12:00～13:00（受付: 09:45〜11:45）</option>
                <option value="2">14:00～15:00（受付: 09:45〜13:45）</option>
                <option value="3">15:00～16:00（受付: 09:45〜14:45）</option>
                <option value="4">16:00～16:45（受付: 09:45〜15:45）</option>
            </select>
            <button class="btn-draw" onclick="drawLottery()">抽選を引く</button>
        </div>

        <div id="loading-view" class="loading-container">
            <div class="spinner"></div>
            <p style="color: #d97706; font-weight: bold;">抽選をしています...</p>
        </div>

        <div id="result-win" class="result-box win-box">
            <div class="result-title">🎉 見事当選しました！</div>
            <p>ワークショップ参加整理券</p>
            <span class="result-time" id="win-time-display">--:-- 〜</span>
            <p style="font-size: 0.9rem; margin-bottom: 0;">この画面をスタッフへお見せください。</p>
        </div>

        <div id="result-lose" class="result-box lose-box">
            <div class="result-title">😢 残念ながら落選です</div>
            <p>ご希望の時間帯はお取りできませんでした。<br>またの機会をお待ちしております。</p>
        </div>

        <div class="ticket-id" id="ticket-id-display"></div>
    </div>

    <script>
        // ==========================================
        // 抽選プログラム・設定データ
        // ==========================================
        const masterData = [
            { id: 0, label: "11:00～12:00", startRec: "09:45", endRec: "10:45", capacity: 8 },  // 1時間で8枠
            { id: 1, label: "12:00～13:00", startRec: "09:45", endRec: "11:45", capacity: 8 },  // 2時間で8枠
            { id: 2, label: "14:00～15:00", startRec: "09:45", endRec: "13:45", capacity: 8 },  // 4時間で8枠
            { id: 3, label: "15:00～16:00", startRec: "09:45", endRec: "14:45", capacity: 8 },  // 5時間で8枠
            { id: 4, label: "16:00～16:45", startRec: "09:45", endRec: "15:45", capacity: 6 }   // 6時間で6枠
        ];

        // 各時間帯の「当選した合計人数」を擬似的に記憶・管理する用のキー（不正引き直し防止と連動）
        // ※完全に全員のスマホ間で同期することはサーバーが無いためできませんが、
        // 当選確率（当選しやすさ）は現時刻の均等解放スケジュールに従って判定されます。
        const STORAGE_KEY_STATUS = "workshop_lottery_status"; 
        const STORAGE_KEY_TIME = "workshop_lottery_time";
        const STORAGE_KEY_ID = "workshop_user_ticket_id";

        // 各パターンの当選枠が、受付開始から何分ごとに1枠ずつ解放されるかを計算する
        // 例: 受付時間が60分で定員が8名なら、7.5分に1枠ずつ当選が生まれる仕組み
        function checkLotteryResult(pattern) {
            const now = new Date();
            const todayStr = now.toLocaleDateString('en-US');

            const startRecTime = new Date(`${todayStr} ${pattern.startRec}`).getTime();
            const endRecTime = new Date(`${todayStr} ${pattern.endRec}`).getTime();
            const nowTime = now.getTime();

            // 受付時間外の場合は落選にする
            if (nowTime < startRecTime || nowTime > endRecTime) {
                return false; 
            }

            // 受付の全時間（ミリ秒）
            const totalDuration = endRecTime - startRecTime;
            // 受付開始からの経過時間（ミリ秒）
            const elapsed = nowTime - startRecTime;

            // 現時刻において、均等割で「解放されていなければならない当選枠の数」
            // 経過の割合 (elapsed / totalDuration) × 定員
            const currentRatio = elapsed / totalDuration;
            const releasedSlots = Math.floor(currentRatio * pattern.capacity);

            // 【判定用ロジック】
            // 時間の経過に合わせて「当選スロット」を配分。
            // 例えば 15% の時間が経過していたら、全体数の 15% の確率で当選するように調整
            const currentWinProbability = (releasedSlots + 1) / pattern.capacity;

            // 通常のランダム抽選に「均等解放係数」を掛け合わせて当選率を調整
            // 後半になればなるほど、未開放だった枠が全て解放されるため、本来の当選率に収束します
            const baseRandom = Math.random();
            
            // 例：全体のベース確率を35%とし、それに現時刻の「均等解放割合」をかけることで、早い時間の当たりすぎを防ぎます。
            const finalProbability = 0.35 * (elapsed / totalDuration);

            return baseRandom < finalProbability;
        }

        // ページ読み込み時の状態確認
        window.onload = function() {
            let userTicketId = localStorage.getItem(STORAGE_KEY_ID);
            if (!userTicketId) {
                const randomStr = Math.random().toString(36).substring(2, 10).toUpperCase();
                const timestamp = Date.now();
                userTicketId = `WS-${randomStr}-${timestamp}`;
                localStorage.setItem(STORAGE_KEY_ID, userTicketId);
            }
            document.getElementById('ticket-id-display').textContent = `ID: ${userTicketId}`;

            const status = localStorage.getItem(STORAGE_KEY_STATUS) || 'none';
            const selectedTime = localStorage.getItem(STORAGE_KEY_TIME);

            if (status === 'win') {
                showWinScreen(selectedTime);
            } else if (status === 'lose') {
                showLoseScreen();
            }
        };

        // 抽選ボタンを押したときの処理
        function drawLottery() {
            const selectEl = document.getElementById('time-select');
            const patternIdx = parseInt(selectEl.value);
            const selectedPattern = masterData[patternIdx];

            // 1. 入力画面を隠し、ローディングを表示
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('loading-view').style.display = 'flex';

            // 2. 1.5秒のドキドキ演出の後に判定
            setTimeout(() => {
                document.getElementById('loading-view').style.display = 'none';

                // 均等割りロジックで当選判定
                const isWin = checkLotteryResult(selectedPattern);

                if (isWin) {
                    localStorage.setItem(STORAGE_KEY_STATUS, 'win');
                    localStorage.setItem(STORAGE_KEY_TIME, selectedPattern.label);
                    showWinScreen(selectedPattern.label);
                } else {
                    localStorage.setItem(STORAGE_KEY_STATUS, 'lose');
                    showLoseScreen();
                }
            }, 1500);
        }

        function showWinScreen(timeText) {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('loading-view').style.display = 'none';
            document.getElementById('win-time-display').textContent = timeText;
            document.getElementById('result-win').style.display = 'block';
        }

        function showLoseScreen() {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('loading-view').style.display = 'none';
            document.getElementById('result-lose').style.display = 'block';
        }
    </script>
</body>
</html>
