<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワークショップ抽選システム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fdf6ec;
            color: #4a3728;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            border: 3px solid #f59e0b;
            border-radius: 20px;
            padding: 25px 15px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.15);
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.6rem;
            color: #d97706;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .desc {
            font-size: 0.9rem;
            color: #78350f;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        /* 時間帯一覧リスト */
        .time-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            text-align: left;
        }
        
        /* 各時間帯の選択肢カード */
        .time-item {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background-color: #f9fafb;
        }
        .time-item.selected {
            border-color: #f59e0b;
            background-color: #fffbeb;
            box-shadow: 0 0 0 1px #f59e0b;
        }
        .time-item.selected .time-title {
            color: #b45309;
        }
        
        /* 受付終了・時間外のグレーアウト表示 */
        .time-item.disabled {
            border-color: #e5e7eb;
            background-color: #f3f4f6;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .time-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #374151;
            margin: 0 0 4px 0;
        }
        .time-meta {
            font-size: 0.8rem;
            color: #6b7280;
            margin: 0;
        }
        
        /* バッジ（受付中、受付終了など） */
        .badge {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .badge-active { background-color: #d1fae5; color: #065f46; }
        .badge-closed { background-color: #fee2e2; color: #991b1b; }
        .badge-waiting { background-color: #f3f4f6; color: #4b5563; }

        /* 抽選するボタン */
        .btn-draw {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #d97706;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(217, 119, 6, 0.2);
            transition: background 0.2s;
        }
        .btn-draw:hover {
            background-color: #b45309;
        }
        .btn-draw:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* ローディング */
        .loading-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }
        .spinner {
            width: 70px; height: 70px;
            border: 7px solid rgba(245, 158, 11, 0.2);
            border-top: 7px solid #d97706;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 結果画面 */
        .result-view {
            display: none;
            border-radius: 15px;
            padding: 25px 15px;
            margin-top: 10px;
            text-align: center;
        }
        .win-box { background-color: #ecfdf5; border: 3px solid #10b981; color: #065f46; }
        .lose-box { background-color: #fff5f5; border: 3px solid #f87171; color: #991b1b; }
        
        .result-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 15px; line-height: 1.3; }
        .win-title { color: #047857; }
        .lose-title { color: #dc2626; }
        
        .result-meta { font-size: 1.1rem; margin: 10px 0; line-height: 1.5; }
        .result-time {
            color: #b45309; 
            font-weight: bold; 
            font-size: 1.8rem;
            display: block;
            margin: 15px 0;
        }
        .result-seat { 
            font-size: 1.1rem; 
            color: #065f46; 
            font-weight: bold; 
            background-color: #ffffff;
            border: 2px dashed #10b981;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .ticket-id {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 25px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="app-title">デジタル抽選</h1>
        
        <div id="setup-view" style="display: none;">
            <p class="desc">ご希望の時間帯をタップして選択し、<br>「抽選を引く」ボタンを押してください。<br>※お一人様一回限りです。</p>
            
            <div class="time-list" id="time-list-container">
                </div>
            
            <button class="btn-draw" id="btn-draw-submit" onclick="drawLottery()" disabled>時間帯を選択してください</button>
        </div>

        <div id="loading-view" class="loading-container" style="display: flex;">
            <div class="spinner"></div>
            <p id="loading-text" style="color: #b45309; font-weight: bold; font-size: 1.2rem; margin: 0;">空き状況を取得中・・・</p>
        </div>

        <div id="result-win" class="result-view win-box">
            <div class="result-title win-title">🎉 当選おめでとうございます！</div>
            <div class="result-meta">
                時間帯：<span id="win-label" style="font-weight: bold;">--:--</span>
                <span class="result-time" id="win-time">--:-- 〜</span>
                <div class="result-seat" id="win-seat">管理用：--</div>
            </div>
            <p style="font-size: 0.85rem; margin-top: 20px; color: #047857;">※この画面をスタッフへご提示ください</p>
        </div>

        <div id="result-lose" class="result-view lose-box">
            <div class="result-title lose-title">😢 残念ながら落選です</div>
            <p class="result-meta">ご希望の時間帯はお取りできませんでした。<br>またのご参加をお待ちしております。</p>
        </div>

        <div class="ticket-id" id="ticket-id-display"></div>
    </div>

    <script>
        // ==========================================
        // ★ここに取得した「ウェブアプリのURL」を貼り付けてください！
        // ==========================================
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxTx1VzLecju0NMANcR1sZYeBbIKt0hMVtNJAdauV8L-PRWvA2XhNgPz77cEs64mZgy5A/exec";

        // 各時間帯のマスタ定義データ（表示用、受付時間判定用）
        const masterData = [
            { id: 0, label: "11:00～12:00", startRec: "09:45", endRec: "10:45" },
            { id: 1, label: "12:00～13:00", startRec: "09:45", endRec: "11:45" },
            { id: 2, label: "14:00～15:00", startRec: "09:45", endRec: "13:45" },
            { id: 3, label: "15:00～16:00", startRec: "09:45", endRec: "14:45" },
            { id: 4, label: "16:00～16:45", startRec: "09:45", endRec: "15:45" }
        ];

        const STORAGE_KEY_STATUS = "workshop_lottery_status"; 
        const STORAGE_KEY_TIME = "workshop_lottery_time";
        const STORAGE_KEY_SLOT_TIME = "workshop_lottery_slot_time";
        const STORAGE_KEY_SEAT = "workshop_lottery_seat";
        const STORAGE_KEY_ID = "workshop_user_ticket_id";

        let userTicketId = "";
        let selectedId = null; // 現在選ばれている時間帯のID

        window.onload = function() {
            // ユーザーIDの設定
            userTicketId = localStorage.getItem(STORAGE_KEY_ID);
            if (!userTicketId) {
                const randomStr = Math.random().toString(36).substring(2, 10).toUpperCase();
                const timestamp = Date.now();
                userTicketId = `WS-${randomStr}-${timestamp}`;
                localStorage.setItem(STORAGE_KEY_ID, userTicketId);
            }
            document.getElementById('ticket-id-display').textContent = `ID: ${userTicketId}`;

            // 抽選ステータスを確認
            const status = localStorage.getItem(STORAGE_KEY_STATUS);
            if (status === 'win') {
                const savedTime = localStorage.getItem(STORAGE_KEY_TIME);
                const savedSlotTime = localStorage.getItem(STORAGE_KEY_SLOT_TIME);
                const savedSeat = localStorage.getItem(STORAGE_KEY_SEAT);
                showFinalResult(true, savedTime, savedSlotTime, savedSeat);
            } else if (status === 'lose') {
                showFinalResult(false);
            } else {
                // まだ抽選していない場合は、サーバーから現在の空き状況を取得する
                fetchCurrentStatus();
            }
        };

        // サーバー（GAS）からスプレッドシートの登録者データを取得し、画面を描画
        function fetchCurrentStatus() {
            // GASウェブアプリの「doGet」を叩いて状況を取得
            fetch(GAS_WEB_APP_URL)
            .then(response => {
                // もしdoGetが文字列しか返さない場合の保険として、直接GASに最新の空き状況を問い合わせる
                // ※このフェッチが動くように、ステップ1で作ったGAS側のdoGetを一部拡張するとよりスムーズです（後述）
                return fetch(GAS_WEB_APP_URL + "?action=status");
            })
            .then(response => response.json())
            .then(serverData => {
                renderTimeList(serverData);
            })
            .catch(error => {
                console.warn("空き状況のリアルタイム取得に失敗しました。ローカル時間で判定して表示します。", error);
                // 通信エラーでも動くよう、ローカルの時刻判定だけで一覧を描画
                renderTimeList(null);
            });
        }

        // 時間帯一覧リストを画面に組み立てる
        function renderTimeList(serverData) {
            const container = document.getElementById('time-list-container');
            container.innerHTML = ""; // 初期化

            const now = new Date();
            const todayStr = now.toLocaleDateString('en-US');

            masterData.forEach(item => {
                const startRecTime = new Date(`${todayStr} ${item.startRec}`).getTime();
                const endRecTime = new Date(`${todayStr} ${item.endRec}`).getTime();
                const nowTime = now.getTime();

                let isTimeOut = (nowTime < startRecTime || nowTime > endRecTime);
                let isFull = false;

                // サーバーデータがある場合、満員かどうかチェック
                if (serverData && serverData.success && serverData.list) {
                    const matched = serverData.list.find(s => s.id === item.id);
                    if (matched && matched.registered >= matched.capacity) {
                        isFull = true;
                    }
                }

                // 時間帯カードのHTML組み立て
                const div = document.createElement('div');
                div.className = "time-item";
                
                let badgeHtml = "";
                let statusClass = "";

                if (isTimeOut) {
                    div.classList.add('disabled');
                    badgeHtml = `<span class="badge badge-waiting">受付時間外</span>`;
                } else if (isFull) {
                    div.classList.add('disabled');
                    badgeHtml = `<span class="badge badge-closed">受付終了 (満員)</span>`;
                } else {
                    // 受付可能枠
                    badgeHtml = `<span class="badge badge-active">受付中</span>`;
                    div.onclick = function() { selectTime(item.id, div); };
                }

                div.innerHTML = `
                    <p class="time-title">${item.label}</p>
                    <p class="time-meta">（受付時間：${item.startRec} 〜 ${item.endRec}）</p>
                    ${badgeHtml}
                `;
                container.appendChild(div);
            });

            // ローディングを消してメイン画面を表示
            document.getElementById('loading-view').style.display = 'none';
            document.getElementById('setup-view').style.display = 'block';
        }

        // 時間帯カードを選択した時のハイライト制御
        function selectTime(id, element) {
            // 一旦すべてのカードからselectedクラスを外す
            const items = document.querySelectorAll('.time-item');
            items.forEach(item => item.classList.remove('selected'));

            // クリックされたカードにselectedクラスを付与
            element.classList.add('selected');
            selectedId = id;

            // 「抽選を引く」ボタンを活性化
            const btn = document.getElementById('btn-draw-submit');
            btn.disabled = false;
            btn.textContent = "抽選を引く";
        }

        // 抽選実行
        function drawLottery() {
            if (selectedId === null) return;

            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('loading-text').textContent = "抽選をおこなっています・・・";
            document.getElementById('loading-view').style.display = 'flex';

            fetch(GAS_WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    id: selectedId,
                    userId: userTicketId
                })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading-view').style.display = 'none';

                if (!data.success) {
                    alert("通信エラー: " + (data.message || "もう一度お試しください。"));
                    document.getElementById('setup-view').style.display = 'block';
                    return;
                }

                if (data.isWin) {
                    const label = masterData.find(item => item.id === selectedId).label;
                    localStorage.setItem(STORAGE_KEY_STATUS, 'win');
                    localStorage.setItem(STORAGE_KEY_TIME, label);
                    localStorage.setItem(STORAGE_KEY_SLOT_TIME, data.slotTime);
                    localStorage.setItem(STORAGE_KEY_SEAT, data.slotName);
                    
                    showFinalResult(true, label, data.slotTime, data.slotName);
                } else {
                    localStorage.setItem(STORAGE_KEY_STATUS, 'lose');
                    showFinalResult(false);
                }
            })
            .catch(error => {
                document.getElementById('loading-view').style.display = 'none';
                document.getElementById('setup-view').style.display = 'block';
                alert("サーバーとの通信に失敗しました。電波の良い場所で再度お試しください。");
                console.error(error);
            });
        }

        function showFinalResult(isWin, label = "", slotTime = "", slotName = "") {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('loading-view').style.display = 'none';
            document.getElementById('app-title').style.display = 'none';

            if (isWin) {
                document.getElementById('win-label').textContent = label;
                document.getElementById('win-time').textContent = `${slotTime} 〜`;
                document.getElementById('win-seat').textContent = `当選順：${slotName}`;
                document.getElementById('result-win').style.display = 'block';
            } else {
                document.getElementById('result-lose').style.display = 'block';
            }
        }
    </script>
</body>
</html>
