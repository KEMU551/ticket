<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワークショップ抽選システム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fdf6ec;
            color: #4a3728;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            border: 3px solid #f59e0b;
            border-radius: 20px;
            padding: 30px 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.15);
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.8rem;
            color: #d97706;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .desc {
            font-size: 0.95rem;
            color: #78350f;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #f59e0b;
            border-radius: 10px;
            background-color: #fffbeb;
            color: #78350f;
            font-weight: bold;
            margin-bottom: 20px;
            outline: none;
        }
        .btn-draw {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #d97706;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(217, 119, 6, 0.2);
            transition: background 0.2s;
        }
        .btn-draw:hover {
            background-color: #b45309;
        }
        .loading-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }
        .spinner {
            width: 80px; height: 80px;
            border: 8px solid rgba(245, 158, 11, 0.2);
            border-top: 8px solid #d97706;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 結果画面（v11と同じカラーリング仕様） */
        .overlay-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }
        .win-bg { background-color: #ecfdf5; border: 5px solid #10b981; color: #065f46; }
        .lose-bg { background-color: #fff5f5; border: 5px solid #f87171; color: #991b1b; }
        
        .result-title { font-size: 2.4rem; font-weight: bold; margin-bottom: 20px; text-align: center; line-height: 1.3; }
        .win-text { color: #047857; }
        .lose-text { color: #dc2626; }
        
        .info-text { font-size: 1.4rem; margin: 10px 0; line-height: 1.6; text-align: center; }
        .win-bg .info-text { color: #065f46; }
        .lose-bg .info-text { color: #7f1d1d; }
        
        .seat-text { font-size: 1.1rem; color: #065f46; margin-top: 30px; text-align: center; font-weight: bold; }
        .tap-to-close { margin-top: 40px; color: #6b7280; font-size: 0.9rem; }

        .ticket-id {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="main-card" class="card">
        <h1>デジタル抽選</h1>
        
        <div id="setup-view">
            <p class="desc">ご希望の時間帯を選択して、<br>「抽選を引く」ボタンを押してください。<br>※お一人様一回限りです。</p>
            <select id="time-select">
                <option value="0">11:00～12:00（受付: 09:45〜10:45）</option>
                <option value="1">12:00～13:00（受付: 09:45〜11:45）</option>
                <option value="2">14:00～15:00（受付: 09:45〜13:45）</option>
                <option value="3">15:00～16:00（受付: 09:45〜14:45）</option>
                <option value="4">16:00～16:45（受付: 09:45〜15:45）</option>
            </select>
            <button class="btn-draw" onclick="drawLottery()">抽選を引く</button>
        </div>

        <div id="loading-view" class="loading-container">
            <div class="spinner"></div>
            <p style="color: #b45309; font-weight: bold; font-size: 1.5rem;">抽選中・・・</p>
        </div>

        <div class="ticket-id" id="ticket-id-display"></div>
    </div>

    <div id="result-screen" class="overlay-screen" onclick="closeResult()">
        <div class="result-title" id="result-title"></div>
        <div class="info-text" id="result-meta"></div>
        <div class="seat-text" id="result-seat"></div>
        <div class="tap-to-close">画面をタップして閉じる</div>
    </div>

    <audio id="sound-win" src="win.mp3"></audio>
    <audio id="sound-lose" src="lose.mp3"></audio>

    <script>
        // ==========================================
        // 【v11完全移植】マスタデータ定義と枠生成処理
        // ==========================================
        const masterData = [
            { id: 0, label: "11:00～12:00", startRec: "09:45", endRec: "10:45", startWs: "11:00", endWs: "12:00" },
            { id: 1, label: "12:00～13:00", startRec: "09:45", endRec: "11:45", startWs: "12:00", endWs: "13:00" },
            { id: 2, label: "14:00～15:00", startRec: "09:45", endRec: "13:45", startWs: "14:00", endWs: "15:00" },
            { id: 3, label: "15:00～16:00", startRec: "09:45", endRec: "14:45", startWs: "15:00", endWs: "16:00" },
            { id: 4, label: "16:00～16:45", startRec: "09:45", endRec: "15:45", startWs: "16:00", endWs: "16:45" }
        ];

        const STORAGE_KEY_STATUS = "workshop_lottery_status"; // 'none', 'win', 'lose'
        const STORAGE_KEY_TIME = "workshop_lottery_time";
        const STORAGE_KEY_SEAT = "workshop_lottery_seat";
        const STORAGE_KEY_ID = "workshop_user_ticket_id";

        // 時間枠（席）の自動生成（v11と全く同じロジック）
        function generateSlots(startTimeStr, endTimeStr) {
            let slots = [];
            let current = new Date(`2026/01/01 ${startTimeStr}`);
            const end = new Date(`2026/01/01 ${endTimeStr}`);
            
            while (current < end) {
                const timeStr = current.toTimeString().substring(0, 5);
                slots.push({ time: timeStr, name: "1人目" });
                slots.push({ time: timeStr, name: "2人目" });
                current.setMinutes(current.getMinutes() + 15);
            }
            return slots; 
        }

        // タイムスタンプ（当たり時刻リスト）の生成（v11と全く同じロジック）
        function generateWinTimestamps(item, totalCapacity) {
            const todayStr = new Date().toLocaleDateString('en-US');
            const startRecTime = new Date(`${todayStr} ${item.startRec}`).getTime();
            const endRecTime = new Date(`${todayStr} ${item.endRec}`).getTime();
            
            const tenMinutesMs = 10 * 60 * 1000;
            const lastSlotTime = endRecTime - tenMinutesMs;
            
            let timestamps = [];

            if (totalCapacity > 1) {
                const interval = (lastSlotTime - startRecTime) / (totalCapacity - 1);
                for (let i = 0; i < totalCapacity - 1; i++) {
                    const stepTime = startRecTime + (interval * i);
                    timestamps.push(stepTime);
                }
                timestamps.push(lastSlotTime);
            } else {
                timestamps.push(startRecTime);
            }
            return timestamps;
        }

        // ==========================================
        // メイン抽選ロジック
        // ==========================================
        function executeLottery(patternId) {
            const now = new Date().getTime();
            const targetPattern = masterData.find(item => item.id === patternId);
            const slots = generateSlots(targetPattern.startWs, targetPattern.endWs);
            const winTimestamps = generateWinTimestamps(targetPattern, slots.length);

            // 現時刻までに「解放（当選）して良いはず」の最大当選枠数を割り出す
            let releasedCount = 0;
            winTimestamps.forEach(time => {
                if (now >= time) releasedCount++;
            });

            // 【重要】
            // スタッフ用端末が無いため、他人の当選をリアルタイムに集計できません。
            // そのため、タイムスタンプによって現時点で解放されている「確率」に疑似変換して判定します。
            // これにより、早く引きすぎた場合は絶対に当選せず、時間経過に合わせて枠が等間隔で確実に解放されていきます。
            const ratio = releasedCount / slots.length; 
            const isWin = Math.random() < ratio;

            if (isWin && releasedCount > 0) {
                // 当選した場合は、現在解放されているスロットの中からランダム、または進行に合わせたインデックスの席を割り当てる
                const slotIndex = Math.min(releasedCount - 1, slots.length - 1);
                const assignedSlot = slots[slotIndex];
                
                localStorage.setItem(STORAGE_KEY_STATUS, 'win');
                localStorage.setItem(STORAGE_KEY_TIME, targetPattern.label);
                localStorage.setItem(STORAGE_KEY_SEAT, `当選時間: ${assignedSlot.time} 〜 (${assignedSlot.name})`);
                
                showResult(true, assignedSlot.time, assignedSlot.name, targetPattern.label);
            } else {
                localStorage.setItem(STORAGE_KEY_STATUS, 'lose');
                showResult(false, null, null, null);
            }
        }

        // ページ読み込み時に既に引いているかチェック
        window.onload = function() {
            let userTicketId = localStorage.getItem(STORAGE_KEY_ID);
            if (!userTicketId) {
                const randomStr = Math.random().toString(36).substring(2, 10).toUpperCase();
                const timestamp = Date.now();
                userTicketId = `WS-${randomStr}-${timestamp}`;
                localStorage.setItem(STORAGE_KEY_ID, userTicketId);
            }
            document.getElementById('ticket-id-display').textContent = `ID: ${userTicketId}`;

            const status = localStorage.getItem(STORAGE_KEY_STATUS);
            if (status === 'win') {
                const savedTime = localStorage.getItem(STORAGE_KEY_TIME);
                const savedSeat = localStorage.getItem(STORAGE_KEY_SEAT);
                // すでに当選している場合は当選画面を固定表示
                showSavedResult(true, savedTime, savedSeat);
            } else if (status === 'lose') {
                // すでに落選している場合は落選画面を固定表示
                showSavedResult(false, null, null);
            }
        };

        // 抽選ボタン起動
        function drawLottery() {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('loading-view').style.display = 'flex';

            // 2.5秒のローディング演出（v11と全く同一）
            setTimeout(() => {
                document.getElementById('loading-view').style.display = 'none';
                const selectEl = document.getElementById('time-select');
                executeLottery(parseInt(selectEl.value));
            }, 2500);
        }

        // 結果画面の表示（v11と同じカラー、サイズ）
        function showResult(isWin, slotTime, slotName, label) {
            const screen = document.getElementById('result-screen');
            const title = document.getElementById('result-title');
            const meta = document.getElementById('result-meta');
            const seat = document.getElementById('result-seat');

            if (isWin) {
                screen.className = 'overlay-screen win-bg';
                title.textContent = 'おめでとうございます！';
                title.className = 'result-title win-text';
                meta.innerHTML = `時間帯 【${label}】 に当選しました！<br><span style="color:#b45309; font-weight:bold; font-size:2.2rem;">参加時間：${slotTime} 〜</span>`;
                seat.textContent = `管理用：${slotName}`;
                document.getElementById('sound-win').play().catch(()=>{});
            } else {
                screen.className = 'overlay-screen lose-bg';
                title.textContent = 'ご希望のコンテンツを\nお取りできませんでした';
                title.className = 'result-title lose-text';
                meta.textContent = '';
                seat.textContent = '';
                document.getElementById('sound-lose').play().catch(()=>{});
            }
            screen.style.display = 'flex';
        }

        // 保存された結果を再表示する場合
        function showSavedResult(isWin, label, seatText) {
            const screen = document.getElementById('result-screen');
            const title = document.getElementById('result-title');
            const meta = document.getElementById('result-meta');
            const seat = document.getElementById('result-seat');

            document.getElementById('setup-view').style.display = 'none';

            if (isWin) {
                screen.className = 'overlay-screen win-bg';
                title.textContent = '【当選整理券】';
                title.className = 'result-title win-text';
                meta.innerHTML = `時間帯 【${label}】<br><span style="color:#b45309; font-weight:bold; font-size:1.8rem;">${seatText}</span>`;
                seat.textContent = '※この画面をスタッフへ提示してください';
            } else {
                screen.className = 'overlay-screen lose-bg';
                title.textContent = '抽選結果：落選';
                title.className = 'result-title lose-text';
                meta.textContent = 'ご希望の時間帯はお取りできませんでした。';
                seat.textContent = '';
            }
            screen.style.display = 'flex';
        }

        function closeResult() {
            const status = localStorage.getItem(STORAGE_KEY_STATUS);
            if (status === 'win' || status === 'lose') {
                // すでに結果が出ている場合は、閉じても結果画面が残る（不正に再抽選させないため）
                const savedTime = localStorage.getItem(STORAGE_KEY_TIME);
                const savedSeat = localStorage.getItem(STORAGE_KEY_SEAT);
                showSavedResult(status === 'win', savedTime, savedSeat);
            } else {
                document.getElementById('result-screen').style.display = 'none';
                document.getElementById('setup-view').style.display = 'block';
            }
        }
    </script>
</body>
</html>
