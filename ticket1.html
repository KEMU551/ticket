<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワークショップ抽選システム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fdf6ec;
            color: #4a3728;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            border: 3px solid #f59e0b;
            border-radius: 20px;
            padding: 30px 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.15);
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.8rem;
            color: #d97706;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .desc {
            font-size: 0.95rem;
            color: #78350f;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        /* セレクトボックスの装飾 */
        select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #f59e0b;
            border-radius: 10px;
            background-color: #fffbeb;
            color: #78350f;
            font-weight: bold;
            margin-bottom: 20px;
            outline: none;
        }
        /* 抽選ボタン */
        .btn-draw {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #d97706;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(217, 119, 6, 0.2);
            transition: background 0.2s;
        }
        .btn-draw:hover {
            background-color: #b45309;
        }
        /* 演出アニメーション */
        .loading-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(245, 158, 11, 0.2);
            border-top: 5px solid #d97706;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 結果表示用の枠 */
        .result-box {
            display: none;
            border-radius: 15px;
            padding: 20px;
            margin-top: 15px;
            text-align: center;
        }
        .win-box {
            background-color: #ecfdf5;
            border: 3px solid #10b981;
            color: #065f46;
        }
        .lose-box {
            background-color: #fff5f5;
            border: 3px solid #f87171;
            color: #991b1b;
        }
        .result-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .result-time {
            font-size: 1.8rem;
            font-weight: bold;
            color: #10b981;
            margin: 15px 0;
            display: block;
        }
        .ticket-id {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>デジタル抽選</h1>
        
        <div id="setup-view">
            <p class="desc">ご希望の時間帯を選択して、<br>「抽選を引く」ボタンを押してください。<br>※お一人様一回限りです。</p>
            <select id="time-select">
                <option value="0">11:00～12:00（受付: 09:45〜10:45）</option>
                <option value="1">12:00～13:00（受付: 09:45〜11:45）</option>
                <option value="2">14:00～15:00（受付: 09:45〜13:45）</option>
                <option value="3">15:00～16:00（受付: 09:45〜14:45）</option>
                <option value="4">16:00～16:45（受付: 09:45〜15:45）</option>
            </select>
            <button class="btn-draw" onclick="drawLottery()">抽選を引く</button>
        </div>

        <div id="loading-view" class="loading-container">
            <div class="spinner"></div>
            <p style="color: #d97706; font-weight: bold;">抽選をしています...</p>
        </div>

        <div id="result-win" class="result-box win-box">
            <div class="result-title">🎉 見事当選しました！</div>
            <p>ワークショップ参加整理券</p>
            <span class="result-time" id="win-time-display">--:-- 〜</span>
            <p style="font-size: 0.9rem; margin-bottom: 0;">この画面をスタッフへお見せください。</p>
        </div>

        <div id="result-lose" class="result-box lose-box">
            <div class="result-title">😢 残念ながら落選です</div>
            <p>ご希望の時間帯はお取りできませんでした。<br>またの機会をお待ちしております。</p>
        </div>

        <div class="ticket-id" id="ticket-id-display"></div>
    </div>

    <script>
        // 定数設定（当選確率：例として 25% に設定）
        const WIN_PROBABILITY = 0.25; 

        const STORAGE_KEY_STATUS = "workshop_lottery_status"; // 'none', 'win', 'lose'
        const STORAGE_KEY_TIME = "workshop_lottery_time";
        const STORAGE_KEY_ID = "workshop_user_ticket_id";

        const timeLabels = [
            "11:00～12:00",
            "12:00～13:00",
            "14:00～15:00",
            "15:00～16:00",
            "16:00～16:45"
        ];

        // ページ読み込み時の状態確認
        window.onload = function() {
            let userTicketId = localStorage.getItem(STORAGE_KEY_ID);
            if (!userTicketId) {
                const randomStr = Math.random().toString(36).substring(2, 10).toUpperCase();
                const timestamp = Date.now();
                userTicketId = `WS-${randomStr}-${timestamp}`;
                localStorage.setItem(STORAGE_KEY_ID, userTicketId);
            }
            document.getElementById('ticket-id-display').textContent = `ID: ${userTicketId}`;

            const status = localStorage.getItem(STORAGE_KEY_STATUS) || 'none';
            const selectedTime = localStorage.getItem(STORAGE_KEY_TIME);

            if (status === 'win') {
                showWinScreen(selectedTime);
            } else if (status === 'lose') {
                showLoseScreen();
            }
        };

        // 抽選ボタンを押したときの処理
        function drawLottery() {
            const selectEl = document.getElementById('time-select');
            const selectedText = timeLabels[selectEl.value];

            // 1. 入力画面を隠し、ローディングを表示
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('loading-view').style.display = 'flex';

            // 2. 1.5秒待ってから結果を判定（ドキドキ感を出す演出）
            setTimeout(() => {
                document.getElementById('loading-view').style.display = 'none';

                // 確率に基づいて当選か落選かを判定
                const isWin = Math.random() < WIN_PROBABILITY;

                if (isWin) {
                    localStorage.setItem(STORAGE_KEY_STATUS, 'win');
                    localStorage.setItem(STORAGE_KEY_TIME, selectedText);
                    showWinScreen(selectedText);
                } else {
                    localStorage.setItem(STORAGE_KEY_STATUS, 'lose');
                    showLoseScreen();
                }
            }, 1500);
        }

        // 当選画面を表示
        function showWinScreen(timeText) {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('loading-view').style.display = 'none';
            document.getElementById('win-time-display').textContent = timeText;
            document.getElementById('result-win').style.display = 'block';
        }

        // 落選画面を表示
        function showLoseScreen() {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('loading-view').style.display = 'none';
            document.getElementById('result-lose').style.display = 'block';
        }
    </script>
</body>
</html>
